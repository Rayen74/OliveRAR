<aside class="flex min-h-full w-64 self-stretch flex-col overflow-hidden border-r border-gray-100 bg-white shadow-sm">

  <!-- Header avec avatar et infos utilisateur -->
  <div class="border-b border-gray-100 px-3 py-4">
    <ng-container *ngIf="currentUser$ | async as currentUser">
      <div class="flex items-center gap-3 rounded-2xl border border-[#e4dcc8] bg-[#f7f4ec] px-4 py-3 shadow-sm">

        <ng-container *ngIf="currentUser.imageUrl; else avatarFallback">
          <img [src]="currentUser.imageUrl" alt="avatar"
               class="h-12 w-12 flex-shrink-0 rounded-full border-2 border-white object-cover shadow-sm">
        </ng-container>

        <ng-template #avatarFallback>
          <div class="flex h-12 w-12 flex-shrink-0 items-center justify-center rounded-full border-2 border-white bg-olive-100 text-sm font-bold text-olive-700 shadow-sm">
            {{ getInitials(currentUser.prenom, currentUser.nom) }}
          </div>
        </ng-template>

        <div class="min-w-0 flex-1">
          <p class="truncate text-sm font-bold leading-tight text-earth-text">
            {{ currentUser.prenom }} {{ currentUser.nom }}
          </p>
          <p class="mt-1 inline-flex max-w-full truncate rounded-full border border-olive-100 bg-white px-2.5 py-1 text-[11px] font-medium text-olive-700">
            {{ formatRole(currentUser.role) }}
          </p>
        </div>
      </div>
    </ng-container>
  </div>

  <!-- Navigation Menu -->
  <nav class="min-h-0 flex-1 space-y-1 overflow-y-auto px-3 py-4">
    <a *ngFor="let item of menuItems"
       [routerLink]="item.link"
       routerLinkActive="border-r-2 border-olive-500 bg-olive-50 font-semibold text-olive-700"
       class="group flex cursor-pointer items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-earth-text transition-all duration-150 hover:bg-olive-50 hover:text-olive-700">

      <span class="material-symbols-outlined text-[20px] text-earth-muted transition-colors group-hover:text-olive-600">
        {{ item.icon }}
      </span>
      <span>{{ item.label }}</span>
    </a>
  </nav>

  <!-- Bouton Déconnexion -->
  <div class="border-t border-gray-100 px-3 py-3">
    <button (click)="onLogout()"
            class="group flex w-full items-center gap-3 rounded-lg px-3 py-2.5 text-sm text-red-500 transition-all duration-150 hover:bg-red-50 hover:text-red-600">
      <span class="material-symbols-outlined text-[20px] text-red-400 transition-colors group-hover:text-red-600">
        logout
      </span>
      <span>Déconnexion</span>
    </button>
  </div>

</aside>
