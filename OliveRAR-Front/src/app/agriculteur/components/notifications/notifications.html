<div class="flex min-h-screen bg-earth-bg">
  <app-agriculteur-sidebar></app-agriculteur-sidebar>

  <main class="flex-1 p-8">
    <header class="flex items-center justify-between mb-8">
      <div>
        <h1 class="text-3xl font-bold text-earth-text">Notifications de Collecte</h1>
        <p class="text-earth-muted text-sm">Suivez vos collectes planifiées</p>
      </div>
    </header>

    <div *ngIf="loading" class="text-center text-earth-muted py-10">Chargement...</div>
    <div *ngIf="error" class="text-red-500 text-center py-4">{{ error }}</div>

    <div *ngIf="!loading && !error">
      <div *ngIf="notifications.length === 0"
           class="text-center text-earth-muted py-10 bg-white rounded-xl border border-earth-border">
        Aucune notification de collecte.
      </div>

      <div class="space-y-4">
        <div *ngFor="let notif of notifications"
             class="p-6 bg-white border border-earth-border rounded-xl shadow-sm border-l-4 border-l-olive-500">
          <div class="flex items-center justify-between mb-2">
            <h2 class="font-semibold text-earth-text">{{ notif.title || 'Collecte planifiée' }}</h2>
            <span class="text-xs text-earth-muted">{{ notif.date | date:'dd/MM/yyyy' }}</span>
          </div>
          <p class="text-sm text-earth-muted">{{ notif.description || 'Notification de collecte' }}</p>
          <div class="mt-3">
            <span class="px-2 py-1 text-xs rounded-full bg-olive-50 text-olive-700">
              {{ notif.status || 'EN ATTENTE' }}
            </span>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
