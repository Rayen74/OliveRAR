<div class="container">

  <!-- CREATE POST -->
  <div class="create-post">
    <input [(ngModel)]="nouveauPost.titre" placeholder="Titre">
    <textarea [(ngModel)]="nouveauPost.contenu" placeholder="Contenu"></textarea>
    <button (click)="publier()">Publier</button>
  </div>

  <!-- POSTS -->
  <div *ngFor="let post of posts" class="post">

    <h3>{{post.titre}}</h3>
    <p>{{post.contenu}}</p>

    <small>{{post.dateCreation | date:'short'}}</small>

    <div class="actions">
      <button (click)="liker(post.id)">❤️ {{post.likes}}</button>
      <button (click)="supprimer(post.id)">🗑️</button>
    </div>

    <!-- COMMENTAIRES -->
    <div class="commentaires">
      <div *ngFor="let c of post.commentaires">
        <b>{{c.agriculteurNom}}:</b> {{c.contenu}}
      </div>
    </div>

    <!-- AJOUT COMMENTAIRE -->
    <div class="add-comment">
      <input
        [(ngModel)]="nouveauCommentaire[post.id]"
        placeholder="Ajouter un commentaire"
      >
      <button (click)="commenter(post.id)">Envoyer</button>
    </div>

  </div>

</div>
