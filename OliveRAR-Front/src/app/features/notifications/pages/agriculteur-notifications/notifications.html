<div class="flex min-h-screen bg-earth-bg">
  <app-sidebar></app-sidebar>

  <main class="flex-1 p-8">
    <header class="mb-8 flex items-center justify-between">
      <div>
        <h1 class="text-3xl font-bold text-earth-text">Suivi des signalements</h1>
        <p class="text-sm text-earth-muted">Consultez l'état de vos signalements terrain.</p>
      </div>
    </header>

    <div *ngIf="loading" class="py-10 text-center text-earth-muted">Chargement...</div>
    <div *ngIf="error" class="py-4 text-center text-red-500">{{ error }}</div>

    <div *ngIf="!loading && !error">
      <div *ngIf="notifications.length === 0"
           class="rounded-xl border border-earth-border bg-white py-10 text-center text-earth-muted">
        Aucun signalement pour le moment.
      </div>

      <div class="space-y-4">
        <div *ngFor="let notif of notifications"
             class="rounded-xl border border-earth-border border-l-4 border-l-olive-500 bg-white p-6 shadow-sm">
          <div class="mb-2 flex items-center justify-between">
            <h2 class="font-semibold text-earth-text">{{ notif.title || 'Signalement' }}</h2>
            <span class="text-xs text-earth-muted">{{ notif.date | date:'dd/MM/yyyy' }}</span>
          </div>
          <p class="text-sm text-earth-muted">{{ notif.description || 'Signalement envoyé' }}</p>
          <div class="mt-3">
            <span class="rounded-full bg-olive-50 px-2 py-1 text-xs text-olive-700">
              {{ notif.status || 'NOUVEAU' }}
            </span>
          </div>
        </div>
      </div>
    </div>
  </main>
</div>
