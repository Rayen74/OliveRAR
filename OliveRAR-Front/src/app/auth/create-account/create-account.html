<ng-container>

  <!-- Floating Toast Notification - outside main container to avoid clipping -->
  <div *ngIf="toast.show" 
       id="auth-toast"
       style="position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); border: 1px solid; backdrop-filter: blur(12px); animation: fade-in 0.3s ease-out forwards; min-width: 280px; max-width: 420px;"
       [style.background-color]="toast.type === 'success' ? '#f0fdf4' : '#fef2f2'"
       [style.border-color]="toast.type === 'success' ? '#86efac' : '#fca5a5'"
       [style.color]="toast.type === 'success' ? '#166534' : '#991b1b'">
    <span style="font-size: 20px; flex-shrink: 0;">{{ toast.type === 'success' ? '✅' : '❌' }}</span>
    <span style="font-size: 14px; font-weight: 500; line-height: 1.4;">{{ toast.message }}</span>
  </div>

  <div class="min-h-screen flex items-center justify-center bg-earth-bg font-sans px-4">
  <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-10">

    <!-- Logo -->
    <div class="flex items-center gap-2 mb-8">
      <img src="Logo.png" alt="CoopOléicole" class="w-8 h-8 rounded-lg object-contain" />
      <span class="text-sm font-semibold text-olive-900">CoopOléicole</span>
    </div>

    <!-- Heading -->
    <h1 class="text-2xl font-semibold text-olive-900 mb-1">Créer un compte</h1>
    <p class="text-sm text-earth-muted mb-8">
      Remplissez les informations ci-dessous pour créer votre compte.
    </p>

    <!-- Error banner -->
    <div *ngIf="errorMsg" class="flex items-center gap-2 border border-alert-500 bg-red-50
                text-alert-500 text-sm rounded-lg px-4 py-3 mb-5">
      <span style="font-size:15px">⚠</span>
      {{ errorMsg }}
    </div>

    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" novalidate>

      <!-- Prénom & Nom -->
      <div class="flex gap-4 mb-4">
        <div class="flex-1">
          <label class="block text-xs font-medium text-earth-text mb-1.5">
            Prénom
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-earth-muted" style="font-size:15px">👤</span>
            <input type="text" formControlName="prenom" placeholder="Prénom"
                   class="w-full pl-9 pr-4 py-2.5 rounded-lg border text-sm
                          text-earth-text placeholder-earth-muted outline-none
                          border-earth-border bg-earth-bg
                          focus:border-olive-500 focus:ring-2 focus:ring-olive-500/20
                          transition-colors" />
          </div>
        </div>
        <div class="flex-1">
          <label class="block text-xs font-medium text-earth-text mb-1.5">
            Nom
          </label>
          <div class="relative">
            <span class="absolute left-3 top-1/2 -translate-y-1/2 text-earth-muted" style="font-size:15px">👤</span>
            <input type="text" formControlName="nom" placeholder="Nom"
                   class="w-full pl-9 pr-4 py-2.5 rounded-lg border text-sm
                          text-earth-text placeholder-earth-muted outline-none
                          border-earth-border bg-earth-bg
                          focus:border-olive-500 focus:ring-2 focus:ring-olive-500/20
                          transition-colors" />
          </div>
        </div>
      </div>

      <!-- Role Selection -->
      <div class="mb-4">
        <label class="block text-xs font-medium text-earth-text mb-1.5">
          Rôle
        </label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-earth-muted" style="font-size:15px">🎖️</span>
          <select formControlName="role"
                  class="w-full pl-9 pr-4 py-2.5 rounded-lg border text-sm
                         text-earth-text outline-none
                         border-earth-border bg-earth-bg
                         focus:border-olive-500 focus:ring-2 focus:ring-olive-500/20
                         appearance-none transition-colors">
            <option *ngFor="let r of roles" [value]="r">{{ r.replace('_', ' ') | titlecase }}</option>
          </select>
          <span class="absolute right-3 top-1/2 -translate-y-1/2 text-earth-muted pointer-events-none" style="font-size:12px">▼</span>
        </div>
      </div>

      <!-- Email -->
      <div class="mb-4">
        <label class="block text-xs font-medium text-earth-text mb-1.5">
          Adresse email
        </label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-earth-muted" style="font-size:15px">✉</span>
          <input type="email" formControlName="email" placeholder="vous@cooperative.tn"
                 class="w-full pl-9 pr-4 py-2.5 rounded-lg border text-sm
                        text-earth-text placeholder-earth-muted outline-none
                        border-earth-border bg-earth-bg
                        focus:border-olive-500 focus:ring-2 focus:ring-olive-500/20
                        transition-colors" />
        </div>
      </div>

      <div class="mb-4">
        <label class="block text-xs font-medium text-earth-text mb-1.5">
          Telephone
        </label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-earth-muted" style="font-size:15px">☎</span>
          <input type="text" formControlName="phoneNumber" maxlength="8" placeholder="12345678"
                 class="w-full pl-9 pr-4 py-2.5 rounded-lg border text-sm
                        text-earth-text placeholder-earth-muted outline-none
                        border-earth-border bg-earth-bg
                        focus:border-olive-500 focus:ring-2 focus:ring-olive-500/20
                        transition-colors" />
        </div>
        <p *ngIf="phoneError" class="mt-2 text-xs text-red-600">{{ phoneError }}</p>
      </div>

      <!-- Password -->
      <div class="mb-4">
        <label class="block text-xs font-medium text-earth-text mb-1.5">
          Mot de passe
        </label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-earth-muted" style="font-size:15px">🔒</span>
          <input [type]="showPwd ? 'text' : 'password'" formControlName="password" placeholder="••••••••"
                 class="w-full pl-9 pr-10 py-2.5 rounded-lg border text-sm
                        text-earth-text placeholder-earth-muted outline-none
                        border-earth-border bg-earth-bg
                        focus:border-olive-500 focus:ring-2 focus:ring-olive-500/20
                        transition-colors" />
          <button type="button" (click)="togglePwd()"
                  class="absolute right-3 top-1/2 -translate-y-1/2
                         text-earth-muted hover:text-olive-700 transition-colors" style="font-size:15px">
            {{ showPwd ? '🙈' : '👁' }}
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="mb-6">
        <label class="block text-xs font-medium text-earth-text mb-1.5">
          Confirmer le mot de passe
        </label>
        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-earth-muted" style="font-size:15px">🔒</span>
          <input [type]="showPwd ? 'text' : 'password'" formControlName="confirmPassword" placeholder="••••••••"
                 class="w-full pl-9 pr-4 py-2.5 rounded-lg border text-sm
                        text-earth-text placeholder-earth-muted outline-none
                        border-earth-border bg-earth-bg
                        focus:border-olive-500 focus:ring-2 focus:ring-olive-500/20
                        transition-colors" />
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" [disabled]="loading"
              class="w-full py-2.5 rounded-lg font-medium text-sm text-white
                     bg-olive-700 hover:bg-olive-900
                     disabled:opacity-60 disabled:cursor-not-allowed
                     transition-colors">
        <span *ngIf="!loading">Créer mon compte</span>
        <span *ngIf="loading" class="flex items-center justify-center gap-2">
          <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
          </svg>
          Création en cours...
        </span>
      </button>

    </form>

    <!-- Already have account -->
    <p class="text-sm text-center text-earth-muted mt-6">
      Vous avez déjà un compte ?
      <a routerLink="/login" class="text-olive-500 hover:text-olive-700 font-medium transition-colors">
        Se connecter
      </a>
    </p>

  </div>

  </div>

</ng-container>
