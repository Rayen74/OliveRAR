<ng-container>

  <!-- Floating Toast Notification -->
  <div *ngIf="toast.show"
       id="auth-toast"
       style="position: fixed; top: 24px; right: 24px; z-index: 9999; display: flex; align-items: center; gap: 12px; padding: 12px 16px; border-radius: 12px; border: 1px solid; backdrop-filter: blur(12px); animation: fade-in 0.3s ease-out forwards; min-width: 280px; max-width: 420px;"
       [style.background-color]="toast.type === 'success' ? '#f0fdf4' : '#fef2f2'"
       [style.border-color]="toast.type === 'success' ? '#86efac' : '#fca5a5'"
       [style.color]="toast.type === 'success' ? '#166534' : '#991b1b'">
    <span class="material-symbols-outlined" style="font-size: 20px; flex-shrink: 0;">{{ toast.type === 'success' ? 'check_circle' : 'error' }}</span>
    <span style="font-size: 14px; font-weight: 500; line-height: 1.4;">{{ toast.message }}</span>
  </div>

  <div class="min-h-screen flex items-center justify-center bg-earth-bg font-sans px-4">
    <div class="w-full max-w-md bg-white rounded-2xl shadow-lg p-10">

      <!-- Logo -->
      <div class="flex items-center gap-2 mb-8">
        <img src="Logo.png" alt="CoopOléicole" class="w-8 h-8 rounded-lg object-contain" />
        <span class="text-sm font-semibold text-olive-900">CoopOléicole</span>
      </div>

      <!-- Heading -->
      <h1 class="text-2xl font-semibold text-olive-900 mb-1">Mot de passe oublié</h1>
      <p class="text-sm text-earth-muted mb-8">
        Entrez votre adresse email pour recevoir un lien de réinitialisation.
      </p>

      <form [formGroup]="forgotForm" (ngSubmit)="onSubmit()" novalidate>

        <!-- Email -->
        <div class="mb-6">
          <label class="block text-xs font-medium text-earth-text mb-1.5">
            Adresse email
          </label>
          <div class="relative">
            <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-earth-muted" style="font-size:15px">mail</span>
            <input type="email" formControlName="email" placeholder="vous@cooperative.tn"
                   class="w-full pl-9 pr-4 py-2.5 rounded-lg border text-sm
                          text-earth-text placeholder-earth-muted outline-none
                          border-earth-border bg-earth-bg
                          focus:border-olive-500 focus:ring-2 focus:ring-olive-500/20
                          transition-colors"
                   [class.border-alert-500]="email.invalid && email.touched" />
          </div>
          <p *ngIf="email.errors?.['required'] && email.touched" class="mt-1 text-xs text-alert-500">
            L'email est obligatoire.
          </p>
          <p *ngIf="email.errors?.['email'] && email.touched" class="mt-1 text-xs text-alert-500">
            Format invalide.
          </p>
        </div>

        <!-- Submit -->
        <button type="submit" [disabled]="loading"
                class="w-full py-2.5 rounded-lg font-medium text-sm text-white
                       bg-olive-700 hover:bg-olive-900
                       disabled:opacity-60 disabled:cursor-not-allowed
                       transition-colors">
          <span *ngIf="!loading">Envoyer le lien</span>
          <span *ngIf="loading" class="flex items-center justify-center gap-2">
            <svg class="animate-spin w-4 h-4" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" />
              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8H4z" />
            </svg>
            Envoi en cours...
          </span>
        </button>

      </form>

      <!-- Back to login -->
      <p class="text-sm text-center text-earth-muted mt-6">
        <a routerLink="/login" class="text-olive-500 hover:text-olive-700 font-medium transition-colors">
          ← Retour à la connexion
        </a>
      </p>

    </div>

  </div>

</ng-container>
