spring.application.name=olive-backend
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/olive_db}
spring.data.mongodb.database=${MONGODB_DATABASE:olive_db}
server.port=${SERVER_PORT:8080}

# Logging
logging.level.org.springframework.web=INFO
logging.level.com.cooperative.olive=DEBUG

# Email Configuration
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Application specific email settings
app.mail.from=${APP_MAIL_FROM:${MAIL_USERNAME:no-reply@oliverar.local}}
app.mail.reset.subject=${APP_MAIL_RESET_SUBJECT:Reinitialisation de votre mot de passe - CoopOleicole}
app.security.jwt.secret=${JWT_SECRET:olive-rar-development-secret-key-change-me-before-production-2026-secure}

# Cloudinary
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Autorise des fichiers plus gros (essentiel pour le Base64)
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
